<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>法考通 · 法律职业资格考试备考助手</title>
  <meta name="description" content="法考通是一个面向法律职业资格考试（法考）的在线备考工具，提供刷题、速记卡片、错题本、知识体系等功能。">
  <meta name="theme-color" content="#d4a84b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
  <link rel="stylesheet" href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap"></noscript>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app-container">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">&#9878;</div>
          <div class="logo-text">
            <span class="logo-title">法考通</span>
            <span class="logo-subtitle">备考助手</span>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-item active" data-page="dashboard">
          <span class="nav-icon">&#9776;</span>
          <span class="nav-text">学习面板</span>
        </div>
        <div class="nav-item" data-page="practice">
          <span class="nav-icon">&#9998;</span>
          <span class="nav-text">刷题练习</span>
        </div>
        <div class="nav-item" data-page="exam">
          <span class="nav-icon">&#128203;</span>
          <span class="nav-text">模拟考试</span>
        </div>
        <div class="nav-item" data-page="flashcards">
          <span class="nav-icon">&#9733;</span>
          <span class="nav-text">速记卡片</span>
        </div>
        <div class="nav-item" data-page="mistakes">
          <span class="nav-icon">&#9888;</span>
          <span class="nav-text">错题本</span>
        </div>
        <div class="nav-item" data-page="knowledge">
          <span class="nav-icon">&#128218;</span>
          <span class="nav-text">知识体系</span>
        </div>
        <div class="nav-item" data-page="laws">
          <span class="nav-icon">&#9878;</span>
          <span class="nav-text">重点法条</span>
        </div>
        <div class="nav-item" data-page="settings">
          <span class="nav-icon">&#9881;</span>
          <span class="nav-text">考试设置</span>
        </div>
      </nav>
      <div class="sidebar-footer">
        <p>法考通 v3.3</p>
        <p>模考 · 智能推荐 · PWA · 快捷键</p>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- 主内容区 -->
    <main class="main-content">
      <header class="top-bar">
        <button class="menu-toggle" id="menuToggle">&#9776;</button>
        <h1 class="page-title" id="pageTitle">学习面板</h1>
      </header>
      <div class="page-content" id="pageContent">
        <!-- 页面内容由 JS 模块动态渲染 -->
        <div class="empty-state" style="margin-top:80px;">
          <div class="empty-state-icon">&#9878;</div>
          <h3>正在加载...</h3>
          <p>数据加载中，请稍候</p>
        </div>
      </div>
    </main>
  </div>

  <!-- PWA Toast -->
  <div id="pwaToast" class="pwa-toast hidden" aria-live="polite">
    <span id="pwaToastMsg"></span>
    <button id="pwaToastBtn" class="btn btn-sm btn-primary" style="display:none;">刷新</button>
  </div>

  <script type="module" src="js/app.js"></script>
  <script>
    // PWA Service Worker 注册 + 更新通知
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js', { scope: './' }).then(reg => {
          console.log('[PWA] SW registered, scope:', reg.scope);

          // 检测更新
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'activated') {
                showPwaToast('新版本已就绪，刷新以体验最新功能', true);
              }
            });
          });
        }).catch(err => {
          console.warn('[PWA] SW registration failed:', err);
        });
      });
    }

    // 离线/在线状态检测
    window.addEventListener('online', () => showPwaToast('网络已恢复 ✓'));
    window.addEventListener('offline', () => showPwaToast('当前离线，数据已缓存可继续使用'));

    function showPwaToast(msg, showBtn) {
      const toast = document.getElementById('pwaToast');
      const msgEl = document.getElementById('pwaToastMsg');
      const btn = document.getElementById('pwaToastBtn');
      if (!toast) return;
      msgEl.textContent = msg;
      btn.style.display = showBtn ? 'inline-block' : 'none';
      toast.classList.remove('hidden');
      if (showBtn) {
        btn.onclick = () => location.reload();
      } else {
        setTimeout(() => toast.classList.add('hidden'), 4000);
      }
    }
  </script>
</body>
</html>
